<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">


    <title>Menu</title>
</head>   
    

<body class="container mt-4">


<h1 id="titulo">Texto de Titulo</h1>
<p id="subtitulo" class="lead">Subitutlo</p>

<div class="caja" id="caja">
<p>soy un elemento oculto</p>
</div>

<div class="mt-3">
    <button id="btnCambiar" class="btn btn-primary mr-2">Cambiar Texto</button>
    <button id="btnMostrar" class="btn btn-success mr-2">Mostrar Ocultar</button>
    <button id="btnFadeIn" class="btn btn-primary mr-2">Fade In</button>
    <button id="btnFadeOut" class="btn btn-primary mr-2">Fade Out</button>
    <button id="btnSlide" class="btn btn-secondary">Slide Slite</button>

</div>



<div class="container mt-5">
<div class="card shadow">
<div class="card-header bg-primary text-white">
<h4 class="mb-0">💳 Calculadora de Préstamos</h4>
</div>
<div class="card-body">
<div class="form-group">
<label for="monto">Monto del préstamo ($)</label>
<input
type="number"
id="monto"
class="form-control"
placeholder="Ej: 10000"
/>
</div>
<div class="form-group">
<label for="tasa">Tasa de interés anual (%)</label>
<input
type="number"
id="tasa"
class="form-control"
placeholder="Ej: 12"
/>
</div>
<div class="form-group">
<label for="plazo">Plazo (meses)</label>
<input
type="number"
id="plazo"
class="form-control"
placeholder="Ej: 24"
/>
</div>
<button id="btnCalcular" class="btn btn-success btn-block">
Calcular
</button>
<div
id="resultado"
class="alert alert-info mt-3"
style="display: none"
></div>
</div>
</div>
</div>




<div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
  <ol class="carousel-indicators">
    <li data-target="#carouselExampleIndicators" data-slide-to="0" class="active"></li>
    <li data-target="#carouselExampleIndicators" data-slide-to="1"></li>
    <li data-target="#carouselExampleIndicators" data-slide-to="2"></li>
  </ol>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="./assets/img/paisaje1.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="./assets/img/paisaje2.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="./assets/img/paisaje1.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-target="#carouselExampleIndicators" data-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="sr-only">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-target="#carouselExampleIndicators" data-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="sr-only">Next</span>
  </button>
</div>












<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
<script src="./js/index.js"></script>    
</body>
</html>
