<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">

    
    <title>Depositar</title>
</head>   
    
<header>
      <div>
        <h1>Alke-Wallet</h1>
    </div>
</header>

<main>

<body>

  <div class="container">

    <div class="row m-2">

    <div class="col-md-6">
    <h2>Depositar</h2>
    
      <div class="form-group">
        <label for="monto">Monto a Depositar :</label>
        <input type="number" class="form-control" id="monto" placeholder="Ingresar Monto" min="2">
      </div>



      <div>
      <button id="sumarbtn" class="btn btn-success">Deposito</button>
      <button id="restarbtn" class="btn btn-danger">Retirar</button>
      </div>

      <div id="resultado" class="alert alert-info mt-3" style="display: none"></div>
    </div>

<br>

      <div class="col-md-6">

<div class="border rounded p-3 m-2">
        <h2>Saldo en Cuenta:</h2>

        <div class="input-group input-group-lg mb-3">
          <div class="input-group-prepend">
          <span class="input-group-text">$</span>
          </div>
          <input type="text" class="form-control" id="balance" value="1000" aria-label="Amount (to the nearest dollar)" disabled>
          <div class="input-group-append">
          <span class="input-group-text">Pesos</span>
          </div>
        </div>
</div>
      </div>
      <div id="resultado2" class="alert alert-info mt-3" style="display: none"></div>

</div>

<div class="d-flex justify-content-center">     
    <a href="./menu.html" class="btn btn-secondary">Volver al Menú Principal ⬅️</a>
</div> 


</div>

<br>


<div aria-live="polite" aria-atomic="true" class="d-flex justify-content-center align-items-center p-2" >
  <div class="position-fixed top-0 right-0 p-3" style="z-index: 5; right: 0; top: 0;">
    <div class="toast" id="toast1" role="alert" aria-live="assertive" aria-atomic="true" data-delay="10000">
    </div>
</div>
</div>


</main>

<footer>
    <div>
        <p>AMS</p>
    </div>
</footer>


<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
<script src="./js/index.js"></script>

</body>
</html>
