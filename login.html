<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">

    <title>Iniciar Sesion</title>
</head>
    
<header  id="miCuadrado2" class="cuadrocielo shadow">
    <div class="container">
      <div class="d-flex justify-content-center d-flex align-items-center">
        <img src="./assets/img/bille5.png" alt="" class="" width="80" ><h1>Alke Wallet</h1>
      </div>
    </div>
</header>
<body>
<main>
  



   


<div class="container p-3">
 
<section class="container overflow-hidden border p-5 rounded shadow-lg bg-white">
    <h2>Inicio de Sesion</h2>
    <p>(usuario:admin / pass:123456)</p>  

<form id="loginForm">

<div class="form-floating mb-3 rounded">
  <label for="username">Usuario</label>
  <input type="username" class="form-control shadow-sm" id="username" aria-describedby="inputGroupPrepend2" placeholder="Ingresar Usuario" required>

</div>


<div class="form-floating rounded">
   <label for="password">Contraseña</label>
  <input type="password" class="form-control shadow-sm" id="password" placeholder="Ingresar Contraseña" minlength="6" maxlength="20" required>
</div>


<br>

<div class="container"></div>

<div class="row">
  <div class="col text-left">
    <div class="form-check form-switch">
      <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
      <label class="form-check-label" for="switchCheckDefault">Recordar Usuario</label>
    </div>
  </div>
    <div class="col text-right">
      <p><a href="./forgotpass.html" class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover">Olvide mi Contraseña</a></p>
    </div>
  </div>


<br>

<div class="d-flex justify-content-around">
  <button class="btn btn-primary rounded shadow-sm col-8" type="submit">Iniciar Sesion</button>
</div>

</form>

</section>
</div> 



<div class="container">


<div class="d-flex justify-content-center m-1"> 
<div class="container text-center">
  <p>Si aun no tienes tu cuenta, crea una nueva en : <a href="./createacount.html" class="btn btn-outline-secondary">Crear Cuenta</a></p>
</div>
</div>
<div class="d-flex justify-content-center p-2"> 
    <a href="./index.html" class="btn btn-outline-primary">Volver Atras ◀️</a>
</div>

</div>

<br>
</main>

<footer class="cuadrocielo shadow">
